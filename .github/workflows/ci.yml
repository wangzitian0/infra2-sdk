name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest --cov --cov-report=term-missing
      - run: python -m build

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error

  extras-smoke:
    needs: package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extra: [core, s3, postgres, http, otel, all]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist
      - name: Smoke-test ${{ matrix.extra }} wheel install
        run: |
          python -m venv .wheel-smoke
          wheel="$(find dist -name '*.whl' -print -quit)"
          if [ "${{ matrix.extra }}" = core ]; then
            spec="$wheel"
          else
            spec="${wheel}[${{ matrix.extra }}]"
          fi
          .wheel-smoke/bin/python -m pip install "$spec"
          .wheel-smoke/bin/python tests/wheel_smoke.py "${{ matrix.extra }}"
          .wheel-smoke/bin/python -m pip check
